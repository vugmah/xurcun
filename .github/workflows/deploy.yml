name: Deploy to Railway
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      # Type-check gate — `tsc -b` passes clean, so it runs and blocks broken builds.
      # (lint/test stay off for now: lint has many pre-existing warnings and there
      #  are no tests yet — tracked as follow-up.)
      - name: Type check
        run: npm run check
      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli@latest
          railway up --service=xurcun
      - name: Smoke test
        # Non-blocking: xurcun.az sits behind Cloudflare Bot Fight Mode, which can
        # 403 a CI curl even when the site is healthy — so a failure here WARNs
        # rather than failing the deploy. Uses a browser UA to reduce false 403s.
        run: |
          echo "Waiting for deploy to settle..."
          sleep 30
          UA="Mozilla/5.0 (compatible; xurcun-ci-smoketest)"
          echo "Testing xurcun.az homepage..."
          curl -A "$UA" -I -sS https://xurcun.az/ | head -1 || echo "WARN: homepage check inconclusive (Cloudflare?)"
          echo "Testing sitemap.xml..."
          curl -A "$UA" -sS https://xurcun.az/sitemap.xml | head -1 || echo "WARN: sitemap check inconclusive"
          echo "Smoke test done (non-blocking)."
