    <!-- ═══ HashRouter redirect: / → /#/ ONLY (MUST be first script) ═══ -->
    <script>
      (function() {
        var loc = window.location;
        var path = loc.pathname;
        var hash = loc.hash;
        // Already has hash route → skip
        if (hash && hash.length > 1) return;
        // Not root path → skip (server serves index.html, HashRouter handles /)
        if (path !== '/' && path !== '') return;
        // Redirect: / → /#/
        loc.replace(loc.protocol + '//' + loc.host + '/#' + (loc.search || ''));
      })();
    </script>

    <!-- ═══ Canonical Domain for Tracking (used by initTracking.ts) ═══ -->
    <script>

    <!-- Google Consent Mode v2 — default denied (EU/GDPR compliant) -->

        ad_user_data: 'denied',
        ad_personalization: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        personalization_storage: 'denied',
        wait_for_update: 500
      });
    </script>
    <!-- End Google Consent Mode v2 -->

    <script>
      // data-gtm click tracking
      document.addEventListener('click', function(e) {
        var el = e.target.closest('[data-gtm]');
        if (el && window.dataLayer) {
          window.dataLayer.push({
            event: 'gtm.click',
            gtm_tag: el.getAttribute('data-gtm'),
            gtm_label: el.textContent.trim().substring(0, 50)
          });
        }
      });
    </script>
